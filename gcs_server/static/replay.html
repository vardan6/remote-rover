<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>Remote Rover Replay</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/static/style.css?v=terrain-map-20260427h">
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    >
  </head>
  <body data-page="replay">
    <main class="app-shell" data-app-shell>
      <section data-page-intro></section>
      <section class="inline-actions">
        <button id="refresh-sessions" class="ghost" type="button">Refresh Sessions</button>
        <button id="rollover-session" type="button">Start New Session</button>
      </section>

      <section class="replay-shell">
        <section id="replay-split-pane" class="replay-split-pane">
          <article class="panel replay-sidebar">
            <div class="panel-head">
              <h2>Sessions</h2>
              <span id="current-session-pill" class="pill">No active session</span>
            </div>
            <div id="session-list" class="session-list"></div>
          </article>

          <div
            id="replay-split-divider"
            class="replay-split-divider"
            role="separator"
            aria-label="Resize sessions and map panels"
            tabindex="0"
          >
            <span class="replay-split-divider-line" aria-hidden="true"></span>
            <span class="replay-split-divider-handle" aria-hidden="true"></span>
          </div>

          <div class="replay-main">
            <article class="panel replay-map-panel">
              <div class="panel-head">
                <h2>Map Playback</h2>
                <span id="loaded-session-pill" class="pill warn">No session loaded</span>
              </div>
              <div class="map-layer-toolbar" aria-label="Map layers">
                <label><input id="layer-terrain" type="checkbox" checked> <span>Terrain</span></label>
                <label><input id="layer-roads" type="checkbox" checked> <span>Roads</span></label>
                <label><input id="layer-objects" type="checkbox" checked> <span>Objects</span></label>
                <label><input id="layer-grid" type="checkbox" checked> <span>Grid</span></label>
                <label><input id="layer-points" type="checkbox" checked> <span>Telemetry Points</span></label>
                <label><input id="layer-path" type="checkbox" checked> <span>Path</span></label>
              </div>
              <div id="replay-map" class="replay-map">
                <div id="map-overlay-controls" class="map-overlay-controls" aria-label="Map tools">
                  <div class="map-overlay-card map-overlay-selects">
                    <label title="Choose how the generated terrain is rendered on the replay map.">
                      <span class="map-tool-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" focusable="false"><path d="M4 7.4 9.6 4l5 2.5L20 4v12.6L14.4 20l-5-2.5L4 20V7.4Zm2 1.1v8l3.2-1.9v-8L6 8.5Zm5.2-1.9v8.1l3.2 1.6V8.2l-3.2-1.6Zm5.2 1.4v8l1.6-1V7l-1.6 1Z"/></svg>
                      </span>
                      <span class="map-tool-label">View</span>
                      <select id="map-view-mode" title="Map rendering mode">
                        <option value="virtual">Virtual Terrain</option>
                        <option value="cad">CAD/Object View</option>
                        <option value="heightmap">Heightmap</option>
                        <option value="satellite-debug">GPS/Satellite Debug</option>
                      </select>
                    </label>
                    <label title="Choose whether the map stays free or follows the rover during replay.">
                      <span class="map-tool-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" focusable="false"><path d="M12 3 5 21l7-3 7 3-7-18Zm0 5.6 3.4 8.8-3.4-1.5-3.4 1.5L12 8.6Z"/></svg>
                      </span>
                      <span class="map-tool-label">Nav</span>
                      <select id="map-nav-mode" title="Map navigation behavior">
                        <option value="free">Free Pan</option>
                        <option value="follow">Follow Rover</option>
                      </select>
                    </label>
                  </div>
                  <div class="map-overlay-card map-fit-actions" aria-label="Map fit actions">
                    <button id="fit-terrain" class="map-tool-button" type="button" title="Fit the full generated terrain scene in the map view" aria-label="Fit terrain">
                      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M5 5h5v2H7v3H5V5Zm9 0h5v5h-2V7h-3V5ZM5 14h2v3h3v2H5v-5Zm12 0h2v5h-5v-2h3v-3Z"/></svg>
                      <span>Fit Terrain</span>
                    </button>
                    <button id="fit-path" class="map-tool-button" type="button" title="Fit the loaded replay route in the map view" aria-label="Fit path">
                      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M6.5 6A2.5 2.5 0 1 0 6.5 11 2.5 2.5 0 0 0 6.5 6Zm0 1.8a.7.7 0 1 1 0 1.4.7.7 0 0 1 0-1.4ZM17.5 13A2.5 2.5 0 1 0 17.5 18 2.5 2.5 0 0 0 17.5 13Zm0 1.8a.7.7 0 1 1 0 1.4.7.7 0 0 1 0-1.4ZM9.1 9.4l1.2-1.5 5.6 4.7-1.2 1.5-5.6-4.7Z"/></svg>
                      <span>Fit Path</span>
                    </button>
                    <button id="jump-rover" class="map-tool-button" type="button" title="Center the map on the rover at the current replay frame" aria-label="Jump to rover">
                      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 2.8 4.5 21 12 17.8 19.5 21 12 2.8Zm0 5.2 3.8 9.2-3.8-1.6-3.8 1.6L12 8Z"/></svg>
                      <span>Jump Rover</span>
                    </button>
                  </div>
                  <span id="map-mode-note" class="map-mode-note">Scene coordinates: X east, Y north.</span>
                </div>
              </div>
              <div class="map-info-bar">
                <span id="map-cursor">Cursor: -</span>
                <span id="map-path-stats">Path: -</span>
                <span id="map-object-detail">Selection: none</span>
              </div>
            </article>

            <article class="panel replay-controls-panel">
              <div class="transport-row">
                <button id="play-pause">Play</button>
                <button id="seek-start" class="ghost">Start</button>
                <label>
                  <span>Speed</span>
                  <select id="replay-speed">
                    <option value="0.5">0.5x</option>
                    <option value="1" selected>1x</option>
                    <option value="2">2x</option>
                    <option value="4">4x</option>
                  </select>
                </label>
              </div>
              <input id="timeline-scrubber" type="range" min="0" max="0" value="0">
              <p id="timeline-status" class="status-banner">Load a session to begin replay.</p>
            </article>
          </div>
        </section>

        <section class="grid replay-bottom-grid">
          <article class="panel replay-telemetry-panel">
            <div class="panel-head"><h2>Telemetry Snapshot</h2></div>
            <dl class="stats">
              <div><dt>Position</dt><dd id="replay-pos">-</dd></div>
              <div><dt>Speed</dt><dd id="replay-speed-card">-</dd></div>
              <div><dt>Heading</dt><dd id="replay-heading">-</dd></div>
              <div><dt>GPS</dt><dd id="replay-gps">-</dd></div>
              <div><dt>Camera</dt><dd id="replay-camera">-</dd></div>
              <div><dt>Power</dt><dd id="replay-power">-</dd></div>
            </dl>
          </article>

          <article class="panel replay-events-panel">
            <div class="panel-head"><h2>Replay Records</h2></div>
            <div class="record-tabs" role="tablist" aria-label="Replay record type">
              <button id="records-telemetry" class="record-tab active" type="button" data-record-view="telemetry">Telemetry Frames</button>
              <button id="records-controls" class="record-tab" type="button" data-record-view="controls">Controls</button>
              <button id="records-events" class="record-tab" type="button" data-record-view="events">System Events</button>
              <button id="records-all" class="record-tab" type="button" data-record-view="all">All Timeline</button>
            </div>
            <div id="event-list" class="event-list"></div>
          </article>
        </section>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/static/common.js" defer></script>
    <script src="/static/replay.js?v=terrain-map-20260427h" defer></script>
  </body>
</html>
